<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名人纪念馆 · 社群空间</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%); font-family: system-ui; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
    .neon { text-shadow: 0 0 15px rgba(168, 85, 247, 0.8); }
    .marquee { animation: marquee 30s linear infinite; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="max-w-6xl mx-auto p-5 md:p-6">

    <!-- 顶部导航 -->
    <nav class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-3">
        <img src="https://miniature-peach-donkey.myfilebase.com/ipfs/QmUjRwaTVSpK9wvXvKJc7jdu5jjvb3XtADk9ZCtUB3bmWH" 
             alt="Logo" class="w-10 h-10 md:w-12 md:h-12 rounded-2xl object-cover">
        <h1 class="text-2xl md:text-3xl font-bold neon">名人纪念馆</h1>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="connectWallet()" class="px-6 py-3 md:px-8 md:py-4 bg-gradient-to-r from-purple-600 to-blue-600 rounded-3xl font-semibold text-base md:text-lg hover:scale-105 transition-all text-center leading-tight">
          连接钱包<br>进入空间
        </button>
        <button onclick="showAdmin()" class="px-5 py-3 text-sm glass rounded-3xl">👑 管理员</button>
      </div>
    </nav>

    <!-- 英雄区 -->
    <div class="text-center mb-10">
      <h2 class="text-4xl md:text-5xl font-bold mb-4 neon">欢迎来到你的专属加密家园</h2>
      <p class="text-lg md:text-xl text-gray-300">资料库 · 精选项目 · 推广工具 · 积分奖励</p>
      <div id="wallet-status" class="mt-6 text-base"></div>
    </div>

    <!-- 实时贡献动态 -->
    <div class="glass rounded-3xl p-5 mb-10">
      <h3 class="text-base font-medium mb-3 flex items-center gap-2"><i class="fas fa-fire text-orange-400"></i> 实时贡献动态</h3>
      <div class="overflow-hidden">
        <div class="marquee text-sm text-gray-300 whitespace-nowrap">
          @用户A 上传了《合约跟单教程》 · +800积分　　@userB 报名黄金量化 · 解锁VIP　　@userC 生成推广海报 · 获得达人徽章　　
        </div>
      </div>
    </div>

    <!-- 推广海报优化版（重点升级） -->
    <div class="glass rounded-3xl p-8 mb-8">
      <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3">
        <span class="text-4xl">📣</span> 推广中心 - 一键生成专属海报
      </h3>
      
      <div class="grid md:grid-cols-2 gap-8">
        <div>
          <input id="promo-text" type="text" placeholder="输入你的署名或推广语（例如：跟着名人纪念馆一起赚）" 
                 class="w-full glass rounded-2xl px-5 py-4 text-white placeholder-gray-400 focus:outline-none text-base">
          
          <div class="mt-4 flex gap-3">
            <button onclick="generatePoster()" 
                    class="flex-1 py-4 bg-gradient-to-r from-pink-500 to-purple-600 rounded-3xl font-semibold text-lg hover:scale-105 transition">
              生成海报
            </button>
            <button onclick="clearPoster()" 
                    class="px-8 py-4 glass rounded-3xl text-sm">清空</button>
          </div>
        </div>

        <!-- 预览区 -->
        <div id="poster-preview" class="hidden bg-gradient-to-br from-purple-900 to-indigo-900 rounded-3xl p-4 border border-purple-500/30">
          <canvas id="poster-canvas" width="600" height="340" class="w-full rounded-2xl shadow-2xl"></canvas>
          <button onclick="downloadPoster()" 
                  class="mt-4 w-full py-3 bg-white text-black rounded-2xl font-semibold flex items-center justify-center gap-2">
            <i class="fas fa-download"></i> 保存图片
          </button>
        </div>
      </div>
    </div>

    <!-- 社群资料库 -->
    <div class="glass rounded-3xl p-8 mb-8">
      <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3"><span class="text-4xl">📚</span> 社群资料库</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="file-list"></div>
    </div>

    <!-- 精选产品 -->
    <div class="glass rounded-3xl p-8">
      <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3"><span class="text-4xl">⭐</span> 精选产品</h3>
      <div class="space-y-6" id="product-list"></div>
    </div>

    <div class="text-center mt-12 text-gray-500 text-sm">
      DeBox 深度整合 · Web3 社群资料库 · MVP 版
    </div>
  </div>

  <!-- 管理员后台（保持） -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass max-w-lg w-full mx-4 rounded-3xl p-8">
      <h3 class="text-2xl font-bold mb-6">👑 管理员后台</h3>
      <input id="new-file-name" type="text" placeholder="资料名称" class="w-full glass rounded-2xl px-5 py-4 mb-4 text-white placeholder-gray-400">
      <input id="new-file-link" type="text" placeholder="IPFS链接" class="w-full glass rounded-2xl px-5 py-4 mb-6 text-white placeholder-gray-400">
      <button onclick="addFile()" class="w-full py-4 bg-green-600 rounded-3xl font-semibold">添加资料到库</button>
      <button onclick="hideAdmin()" class="mt-4 w-full py-4 text-gray-400">关闭</button>
    </div>
  </div>

  <script>
    // ... 连接钱包、产品、文件等功能保持（代码较长，这里省略部分，实际复制时用完整版）...
    // （由于长度限制，我把完整代码发在下一条，如果你需要我现在就把**全部代码**一次性发给你）

    function generatePoster() {
      const text = document.getElementById('promo-text').value.trim() || "跟着名人纪念馆，一起赚加密";
      const canvas = document.getElementById('poster-canvas');
      const ctx = canvas.getContext('2d');
      const preview = document.getElementById('poster-preview');

      // 高清海报背景
      ctx.fillStyle = '#0f0a1f';
      ctx.fillRect(0, 0, 600, 340);

      // 渐变
      const grad = ctx.createLinearGradient(0, 0, 600, 340);
      grad.addColorStop(0, '#4c1d95');
      grad.addColorStop(1, '#1e3a8a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 600, 340);

      // Logo
      ctx.font = 'bold 52px Arial';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('名人纪念馆', 50, 100);

      // 推广语
      ctx.font = 'bold 32px Arial';
      ctx.fillStyle = '#c4d0ff';
      ctx.fillText(text, 50, 190);

      ctx.font = '24px Arial';
      ctx.fillStyle = '#a5b4fc';
      ctx.fillText('扫描加入 · 一起成长', 50, 260);

      preview.classList.remove('hidden');
    }

    function downloadPoster() {
      const canvas = document.getElementById('poster-canvas');
      const link = document.createElement('a');
      link.download = '我的推广海报-名人纪念馆.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function clearPoster() {
      document.getElementById('poster-preview').classList.add('hidden');
      document.getElementById('promo-text').value = '';
    }

    // 其他功能（connectWallet, renderFiles, renderProducts 等）保持不变
    // ...（完整代码我已准备好，如果你确认，我下一条发完整版）
  </script>
</body>
</html>
