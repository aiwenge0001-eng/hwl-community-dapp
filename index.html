<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名人纪念馆 · 社群空间</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%); font-family: system-ui; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
    .neon { text-shadow: 0 0 15px rgba(168, 85, 247, 0.8); }
    .marquee { animation: marquee 30s linear infinite; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="max-w-6xl mx-auto p-5 md:p-6">

    <!-- 全局导航 -->
    <nav class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
      <div onclick="goToPage('home')" class="flex items-center gap-3 cursor-pointer">
        <img src="https://miniature-peach-donkey.myfilebase.com/ipfs/QmUjRwaTVSpK9wvXvKJc7jdu5jjvb3XtADk9ZCtUB3bmWH" alt="Logo" class="w-10 h-10 rounded-2xl object-cover">
        <h1 class="text-2xl font-bold neon">名人纪念馆</h1>
      </div>
      <div class="flex gap-3">
        <button onclick="connectWallet()" class="px-6 py-3 bg-gradient-to-r from-purple-600 to-blue-600 rounded-3xl font-semibold">连接钱包</button>
        <button onclick="showAdmin()" class="px-6 py-3 glass rounded-3xl font-semibold flex items-center gap-2">👑 管理员</button>
      </div>
    </nav>

    <!-- 首页（保持不变） -->
    <div id="page-home" class="page active">
      <!-- ... 首页内容保持不变 ... -->
      <div class="text-center mb-12">
        <h2 class="text-5xl font-bold mb-4 neon">欢迎来到你的专属加密家园</h2>
        <p class="text-xl text-gray-300">资料库 · 精选项目 · 推广工具</p>
      </div>
      <div class="glass rounded-3xl p-5 mb-8">
        <h3 class="text-base font-medium mb-3 flex items-center gap-2"><i class="fas fa-fire text-orange-400"></i> 实时贡献动态</h3>
        <div class="overflow-hidden"><div class="marquee text-sm text-gray-300 whitespace-nowrap">@用户A 上传了《合约跟单教程》 · +800积分　　@userB 报名黄金量化 · 解锁VIP　　@userC 生成推广海报 · 获得达人徽章</div></div>
      </div>
      <div class="glass rounded-3xl p-5 mb-12">
        <h3 class="text-base font-medium mb-3 flex items-center gap-2"><i class="fas fa-trophy text-yellow-400"></i> 成果展示</h3>
        <div class="overflow-hidden"><div class="marquee text-sm text-gray-300 whitespace-nowrap">🎉 用户A 跟单盈利 +28%　　🎉 用户B 海报裂变 47 人　　🎉 用户C 资料被置顶　　🎉 用户D 本月积分第3</div></div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div onclick="goToPage('library')" class="glass rounded-3xl p-10 text-center hover:scale-105 transition cursor-pointer"><div class="text-6xl mb-6">📚</div><h3 class="text-2xl font-semibold">社群资料库</h3></div>
        <div onclick="goToPage('products')" class="glass rounded-3xl p-10 text-center hover:scale-105 transition cursor-pointer"><div class="text-6xl mb-6">⭐</div><h3 class="text-2xl font-semibold">精选产品</h3></div>
        <div onclick="goToPage('promo')" class="glass rounded-3xl p-10 text-center hover:scale-105 transition cursor-pointer"><div class="text-6xl mb-6">📣</div><h3 class="text-2xl font-semibold">推广中心</h3></div>
      </div>
    </div>

    <!-- 资料库页面 -->
    <div id="page-library" class="page">
      <button onclick="goToPage('home')" class="mb-6 text-purple-400 flex items-center gap-2"><i class="fas fa-arrow-left"></i> 返回首页</button>
      <h2 class="text-3xl font-bold mb-8">📚 社群资料库</h2>
      <div id="library-content" class="space-y-10"></div>
    </div>

  </div>

  <!-- 管理员后台 -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass max-w-lg w-full mx-4 rounded-3xl p-8">
      <h3 class="text-2xl font-bold mb-6">👑 管理员后台</h3>
      <div>
        <h4 class="font-medium mb-3">添加资料</h4>
        <select id="category-select" class="w-full glass rounded-2xl px-5 py-4 mb-4">
          <option value="网页链接">🔗 网页链接</option>
          <option value="App应用">📱 App应用</option>
          <option value="项目材料">📦 项目材料</option>
        </select>
        <input id="new-file-name" placeholder="资料名称（选填）" class="w-full glass rounded-2xl px-5 py-4 mb-3">
        <input type="file" id="file-upload" class="w-full glass rounded-2xl px-5 py-4 mb-3">
        <button onclick="uploadFile()" class="w-full py-4 bg-green-600 rounded-3xl">上传并添加到对应分类</button>
      </div>
      <button onclick="hideAdmin()" class="mt-8 w-full py-4 text-gray-400">关闭</button>
    </div>
  </div>

  <script>
    let files = []; // {name, category, link: "#" }

    function goToPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page-${page}`).classList.add('active');
      if (page === 'library') renderLibrary();
    }

    function showAdmin() {
      document.getElementById('admin-modal').classList.remove('hidden');
    }

    function hideAdmin() {
      document.getElementById('admin-modal').classList.add('hidden');
    }

    function uploadFile() {
      const category = document.getElementById('category-select').value;
      const name = document.getElementById('new-file-name').value.trim() || category + " 文件";
      
      files.push({
        name: name,
        category: category,
        link: "#"  // 后续可改成真实 IPFS 链接
      });
      
      renderLibrary();
      hideAdmin();
      alert(`✅ 已上传到「${category}」分类！`);
    }

    function renderLibrary() {
      const container = document.getElementById('library-content');
      const grouped = {};
      files.forEach(f => {
        if (!grouped[f.category]) grouped[f.category] = [];
        grouped[f.category].push(f);
      });

      let html = '';
      Object.keys(grouped).forEach(cat => {
        html += `<div class="mb-8"><h3 class="text-xl font-semibold mb-4 flex items-center gap-3">${cat}</h3>`;
        grouped[cat].forEach((f, index) => {
          html += `
            <a href="${f.link}" target="_blank" class="block glass rounded-3xl p-6 mb-3 hover:bg-white/10 hover:scale-[1.02] transition flex justify-between items-center cursor-pointer">
              <span class="font-medium">${f.name}</span>
              <span class="text-purple-400 text-sm">点击打开 →</span>
            </a>`;
        });
        html += `</div>`;
      });

      container.innerHTML = html || '<p class="text-gray-400 text-center py-12">暂无资料，请点击右上角 👑 管理员 上传</p>';
    }

    function connectWallet() {
      alert("✅ 钱包连接成功！");
    }

    window.onload = () => {
      goToPage('home');
    };
  </script>
</body>
</html>
