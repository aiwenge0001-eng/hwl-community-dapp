<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名人纪念馆 · 社群空间</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%); font-family: system-ui; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
    .neon { text-shadow: 0 0 15px rgba(168, 85, 247, 0.8); }
    .marquee { animation: marquee 30s linear infinite; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="max-w-6xl mx-auto p-5 md:p-6">

    <nav class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
      <div onclick="goToPage('home')" class="flex items-center gap-3 cursor-pointer">
        <img src="https://miniature-peach-donkey.myfilebase.com/ipfs/QmUjRwaTVSpK9wvXvKJc7jdu5jjvb3XtADk9ZCtUB3bmWH" alt="Logo" class="w-10 h-10 rounded-2xl object-cover">
        <h1 class="text-2xl font-bold neon">名人纪念馆</h1>
      </div>
      <div class="flex gap-3">
        <button onclick="connectWallet()" class="px-6 py-3 bg-gradient-to-r from-purple-600 to-blue-600 rounded-3xl font-semibold">连接钱包</button>
        <button onclick="showAdmin()" class="px-6 py-3 glass rounded-3xl font-semibold flex items-center gap-2">👑 管理员</button>
      </div>
    </nav>

    <!-- 资料库页面 -->
    <div id="page-library" class="page active">
      <button onclick="goToPage('home')" class="mb-6 text-purple-400 flex items-center gap-2"><i class="fas fa-arrow-left"></i> 返回首页</button>
      <h2 class="text-3xl font-bold mb-8">📚 社群资料库</h2>
      <div id="library-content" class="space-y-10"></div>
    </div>

  </div>

  <!-- 预览弹窗 -->
  <div id="preview-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="max-w-4xl w-full mx-4">
      <button onclick="closePreview()" class="mb-4 text-white text-xl">✕ 关闭</button>
      <div id="preview-content" class="bg-black rounded-3xl overflow-hidden"></div>
    </div>
  </div>

  <!-- 管理员后台 -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass max-w-lg w-full mx-4 rounded-3xl p-8">
      <h3 class="text-2xl font-bold mb-6">👑 管理员后台</h3>
      <select id="category-select" class="w-full glass rounded-2xl px-5 py-4 mb-4">
        <option value="网页链接">🔗 网页链接</option>
        <option value="App应用">📱 App应用</option>
        <option value="项目材料">📦 项目材料</option>
      </select>
      <input id="new-file-name" placeholder="资料名称" class="w-full glass rounded-2xl px-5 py-4 mb-3">
      <input type="file" id="file-upload" class="w-full glass rounded-2xl px-5 py-4 mb-3">
      <button onclick="uploadFile()" class="w-full py-4 bg-green-600 rounded-3xl">上传并保存</button>
      <button onclick="hideAdmin()" class="mt-6 w-full py-4 text-gray-400">关闭</button>
    </div>
  </div>

  <script>
    let files = JSON.parse(localStorage.getItem('communityFiles')) || [];

    function saveFiles() {
      localStorage.setItem('communityFiles', JSON.stringify(files));
    }

    function goToPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page-${page}`).classList.add('active');
      if (page === 'library') renderLibrary();
    }

    function showAdmin() { document.getElementById('admin-modal').classList.remove('hidden'); }
    function hideAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }

    function uploadFile() {
      const category = document.getElementById('category-select').value;
      const name = document.getElementById('new-file-name').value.trim() || "未命名文件";
      const fileInput = document.getElementById('file-upload');
      
      if (!fileInput.files.length) return alert("请选择文件");

      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        files.push({
          name: name,
          category: category,
          dataUrl: e.target.result,
          type: file.type,
          size: (file.size / 1024 / 1024).toFixed(2) + " MB"
        });
        saveFiles();
        renderLibrary();
        hideAdmin();
        alert(`✅ 上传成功！已保存到「${category}」`);
      };
      reader.readAsDataURL(file);
    }

    function renderLibrary() {
      const container = document.getElementById('library-content');
      const grouped = {};
      files.forEach(f => {
        if (!grouped[f.category]) grouped[f.category] = [];
        grouped[f.category].push(f);
      });

      let html = '';
      Object.keys(grouped).forEach(cat => {
        html += `<div class="mb-10"><h3 class="text-xl font-semibold mb-4">${cat}</h3>`;
        grouped[cat].forEach(f => {
          html += `
            <div onclick="openFile('${f.dataUrl}', '${f.type}', '${f.name}')" 
                 class="glass rounded-3xl p-6 mb-3 hover:bg-white/10 transition flex justify-between items-center cursor-pointer">
              <div>
                <p class="font-medium">${f.name}</p>
                <p class="text-xs text-gray-400">${f.size || ''}</p>
              </div>
              <span class="text-purple-400">📥 查看 / 下载</span>
            </div>`;
        });
        html += `</div>`;
      });

      container.innerHTML = html || '<p class="text-gray-400 text-center py-20">暂无资料，请点击右上角 👑 管理员 上传</p>';
    }

    function openFile(dataUrl, type, name) {
      const modal = document.getElementById('preview-modal');
      const content = document.getElementById('preview-content');

      if (type.startsWith('image/')) {
        content.innerHTML = `<img src="${dataUrl}" class="max-h-[80vh] mx-auto">`;
      } else if (type === 'application/pdf') {
        content.innerHTML = `<iframe src="${dataUrl}" class="w-full h-[80vh]"></iframe>`;
      } else {
        // 其他文件（.docx 等）直接下载
        const link = document.createElement('a');
        link.href = dataUrl;
        link.download = name;
        link.click();
        return;
      }
      modal.classList.remove('hidden');
    }

    function closePreview() {
      document.getElementById('preview-modal').classList.add('hidden');
    }

    function connectWallet() {
      alert("✅ 钱包连接成功！");
    }

    window.onload = () => {
      goToPage('library');   // 默认进入资料库方便测试
    };
  </script>
</body>
</html>
