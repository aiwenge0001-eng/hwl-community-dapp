<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名人纪念馆 · 社群空间</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%); font-family: system-ui; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
    .neon { text-shadow: 0 0 15px rgba(168, 85, 247, 0.8); }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="max-w-6xl mx-auto p-5 md:p-6">

    <nav class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-3">
        <img src="https://miniature-peach-donkey.myfilebase.com/ipfs/QmUjRwaTVSpK9wvXvKJc7jdu5jjvb3XtADk9ZCtUB3bmWH" alt="Logo" class="w-12 h-12 rounded-2xl">
        <h1 class="text-3xl font-bold neon">名人纪念馆</h1>
      </div>
      <div class="flex gap-3">
        <button onclick="connectWallet()" class="px-8 py-4 bg-gradient-to-r from-purple-600 to-blue-600 rounded-3xl font-semibold">连接钱包</button>
        <button onclick="showAdmin()" class="px-6 py-4 glass rounded-3xl">👑 管理员</button>
      </div>
    </nav>

    <!-- 个人中心 & 积分 -->
    <div id="user-info" class="glass rounded-3xl p-6 mb-8 hidden">
      <div class="flex justify-between">
        <div>
          <p class="text-sm text-gray-400">当前积分</p>
          <p id="points" class="text-4xl font-bold">1280</p>
        </div>
        <button onclick="dailyCheckIn()" class="px-6 py-3 bg-orange-500 rounded-2xl">每日签到</button>
      </div>
    </div>

    <!-- 推广海报（多模板） -->
    <div class="glass rounded-3xl p-8 mb-8">
      <h3 class="text-2xl font-semibold mb-6">📣 推广中心</h3>
      <select id="template-select" class="w-full glass rounded-2xl px-5 py-4 mb-4">
        <option value="0">模板1 - 默认</option>
      </select>
      <input id="user-name" type="text" placeholder="输入你的名字/署名" class="w-full glass rounded-2xl px-6 py-5 text-lg mb-6">
      <button onclick="generateCustomPoster()" class="w-full py-5 bg-gradient-to-r from-pink-500 to-purple-600 rounded-3xl text-xl font-bold">生成专属海报</button>
      <div id="poster-preview" class="hidden mt-6 text-center">
        <canvas id="poster-canvas" width="600" height="380" class="mx-auto rounded-3xl shadow-2xl"></canvas>
        <button onclick="downloadPoster()" class="mt-6 w-full py-5 bg-white text-black rounded-3xl font-semibold">💾 保存海报</button>
      </div>
    </div>

    <!-- 其他模块略（保持之前功能） -->

  </div>

  <!-- 管理员后台 -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass max-w-lg w-full mx-4 rounded-3xl p-8">
      <h3 class="text-2xl font-bold mb-6">👑 管理员后台</h3>
      <input id="new-file-name" placeholder="资料名称" class="w-full glass rounded-2xl px-5 py-4 mb-3">
      <input type="file" id="file-upload" class="w-full glass rounded-2xl px-5 py-4 mb-6">
      <button onclick="uploadFile()" class="w-full py-4 bg-green-600 rounded-3xl mb-8">上传文件到 IPFS</button>
      <button onclick="hideAdmin()" class="w-full py-4 text-gray-400">关闭</button>
    </div>
  </div>

  <script>
    let connectedAddress = null;
    let points = 1280;

    async function connectWallet() {
      try {
        if (window.deboxWallet) {
          await window.deboxWallet.connect();
          connectedAddress = window.deboxWallet.address;
        } else if (window.phantom?.solana) {
          await window.phantom.solana.connect();
          connectedAddress = window.phantom.solana.publicKey.toString();
        }
        document.getElementById('user-info').classList.remove('hidden');
        alert(`✅ 钱包已连接！\n地址: ${connectedAddress.slice(0,8)}...`);
      } catch (e) {
        alert("连接失败，请在 DeBox 或 Phantom 中操作");
      }
    }

    function dailyCheckIn() {
      if (!connectedAddress) return alert("请先连接钱包");
      points += 100;
      document.getElementById('points').textContent = points;
      alert("✅ 签到成功 +100 积分！");
    }

    // 其他功能（上传文件、生成海报等）可后续再完善
    function showAdmin() { document.getElementById('admin-modal').classList.remove('hidden'); }
    function hideAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }

    // 占位，实际上传文件需要后端，这里先模拟
    function uploadFile() { alert("文件上传功能开发中...（下一版实现真实 IPFS 上传）"); }
  </script>
</body>
</html>
