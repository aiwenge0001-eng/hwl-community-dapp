<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名人纪念馆 · 社群空间</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%); font-family: system-ui; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
    .neon { text-shadow: 0 0 15px rgba(168, 85, 247, 0.8); }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="max-w-6xl mx-auto p-5 md:p-6">

    <nav class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-3">
        <img src="https://miniature-peach-donkey.myfilebase.com/ipfs/QmUjRwaTVSpK9wvXvKJc7jdu5jjvb3XtADk9ZCtUB3bmWH" 
             alt="Logo" class="w-12 h-12 rounded-2xl object-cover">
        <h1 class="text-3xl font-bold neon">名人纪念馆</h1>
      </div>
      <button onclick="connectWallet()" class="px-8 py-4 bg-gradient-to-r from-purple-600 to-blue-600 rounded-3xl font-semibold">连接钱包</button>
    </nav>

    <!-- 推广海报生成器 -->
    <div class="glass rounded-3xl p-8">
      <h3 class="text-2xl font-semibold mb-6">📣 推广中心 - 专属海报</h3>
      
      <input id="user-name" type="text" placeholder="输入你的名字/署名" 
             class="w-full glass rounded-2xl px-6 py-5 text-lg mb-6 focus:outline-none">

      <button onclick="generateCustomPoster()" 
              class="w-full py-5 bg-gradient-to-r from-pink-500 to-purple-600 rounded-3xl text-xl font-bold mb-6 hover:scale-105 transition">
        生成我的专属海报
      </button>

      <div id="poster-preview" class="hidden mt-4 text-center">
        <canvas id="poster-canvas" width="600" height="380" class="mx-auto rounded-3xl shadow-2xl border border-purple-400/30"></canvas>
        
        <div class="mt-6 space-y-3">
          <button onclick="downloadPoster()" 
                  class="w-full py-5 bg-white text-black rounded-3xl font-semibold text-lg">
            💾 保存并下载海报
          </button>
          <p class="text-xs text-gray-400">苹果手机如果无法直接下载，长按图片 → “添加到相册” 即可保存</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    function generateCustomPoster() {
      const name = document.getElementById('user-name').value.trim() || "推广达人";
      const canvas = document.getElementById('poster-canvas');
      const ctx = canvas.getContext('2d');
      const preview = document.getElementById('poster-preview');

      ctx.clearRect(0, 0, 600, 380);

      // 背景
      ctx.fillStyle = '#1a0033';
      ctx.fillRect(0, 0, 600, 380);

      const grad = ctx.createLinearGradient(0, 0, 600, 380);
      grad.addColorStop(0, '#6b21a8');
      grad.addColorStop(1, '#1e40af');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 600, 380);

      // 标题
      ctx.font = 'bold 52px Arial';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.fillText('名人纪念馆', 300, 120);

      // 用户名字
      ctx.font = 'bold 38px Arial';
      ctx.fillStyle = '#c4d0ff';
      ctx.fillText(name, 300, 220);

      // 口号
      ctx.font = '24px Arial';
      ctx.fillStyle = '#a5b4fc';
      ctx.fillText('欢迎加入 · 一起赚加密', 300, 300);

      preview.classList.remove('hidden');
    }

    function downloadPoster() {
      const canvas = document.getElementById('poster-canvas');
      const link = document.createElement('a');
      link.download = `推广海报-${document.getElementById('user-name').value || '推广达人'}.png`;
      link.href = canvas.toDataURL('image/png', 1.0);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // iOS 提示
      if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
        alert("✅ 海报已生成！\n\n如果没有自动下载，请长按上方图片 → “添加到相册”");
      }
    }
  </script>
</body>
</html>
