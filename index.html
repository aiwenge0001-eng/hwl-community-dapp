<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名人纪念馆 · 社群空间</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%); font-family: system-ui; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
    .neon { text-shadow: 0 0 15px rgba(168, 85, 247, 0.8); }
    .marquee { animation: marquee 35s linear infinite; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="max-w-6xl mx-auto p-5 md:p-6">

    <!-- 顶部导航 -->
    <nav class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-3">
        <img src="https://miniature-peach-donkey.myfilebase.com/ipfs/QmUjRwaTVSpK9wvXvKJc7jdu5jjvb3XtADk9ZCtUB3bmWH" alt="Logo" class="w-12 h-12 rounded-2xl object-cover">
        <h1 class="text-3xl font-bold neon">名人纪念馆</h1>
      </div>
      <div class="flex gap-3">
        <button onclick="connectWallet()" class="px-8 py-4 bg-gradient-to-r from-purple-600 to-blue-600 rounded-3xl font-semibold">连接钱包</button>
        <button onclick="showAdmin()" class="px-6 py-4 glass rounded-3xl">👑 管理员</button>
      </div>
    </nav>

    <!-- 首页欢迎 -->
    <div class="text-center mb-12">
      <h2 class="text-5xl font-bold mb-4 neon">欢迎来到你的专属加密家园</h2>
      <div id="wallet-status" class="text-base"></div>
    </div>

    <!-- 实时动态 -->
    <div class="glass rounded-3xl p-5 mb-10">
      <h3 class="text-base font-medium mb-3 flex items-center gap-2"><i class="fas fa-fire text-orange-400"></i> 实时贡献动态</h3>
      <div class="marquee text-sm text-gray-300 whitespace-nowrap">
        @用户A 上传资料 · +800积分　　@userB 报名项目 · 解锁VIP　　@userC 生成海报 · 获得达人徽章　　
      </div>
    </div>

    <!-- 三大入口 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div onclick="switchTab(0)" class="glass rounded-3xl p-10 text-center hover:scale-105 transition cursor-pointer">
        <div class="text-6xl mb-6">📚</div>
        <h3 class="text-2xl font-semibold">社群资料库</h3>
      </div>
      <div onclick="switchTab(1)" class="glass rounded-3xl p-10 text-center hover:scale-105 transition cursor-pointer">
        <div class="text-6xl mb-6">⭐</div>
        <h3 class="text-2xl font-semibold">精选产品</h3>
      </div>
      <div onclick="switchTab(2)" class="glass rounded-3xl p-10 text-center hover:scale-105 transition cursor-pointer">
        <div class="text-6xl mb-6">📣</div>
        <h3 class="text-2xl font-semibold">推广中心</h3>
      </div>
    </div>

    <!-- Tab 内容区 -->
    <div id="tab-content" class="mt-10"></div>
  </div>

  <!-- 管理员后台 -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass max-w-lg w-full mx-4 rounded-3xl p-8">
      <h3 class="text-2xl font-bold mb-6">👑 管理员后台</h3>
      <input id="new-file-name" placeholder="资料名称" class="w-full glass rounded-2xl px-5 py-4 mb-3">
      <input id="new-file-link" placeholder="IPFS链接" class="w-full glass rounded-2xl px-5 py-4 mb-6">
      <button onclick="addFile()" class="w-full py-4 bg-green-600 rounded-3xl">添加资料</button>
      <button onclick="hideAdmin()" class="mt-6 w-full py-4 text-gray-400">关闭</button>
    </div>
  </div>

  <script>
    let currentTab = 0;
    let connectedAddress = null;
    let files = [];
    let participated = new Set();

    function connectWallet() {
      connectedAddress = "0xDemo..." + Math.random().toString(36).slice(2);
      document.getElementById('wallet-status').innerHTML = `✅ 已连接 ${connectedAddress.slice(0,8)}...`;
      renderCurrentTab();
    }

    function switchTab(tab) {
      currentTab = tab;
      renderCurrentTab();
    }

    function renderCurrentTab() {
      const content = document.getElementById('tab-content');
      if (currentTab === 0) {
        content.innerHTML = `
          <div class="glass rounded-3xl p-8">
            <h3 class="text-2xl font-semibold mb-6">📚 社群资料库</h3>
            <div id="file-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
          </div>`;
        renderFiles();
      } else if (currentTab === 1) {
        content.innerHTML = `
          <div class="glass rounded-3xl p-8">
            <h3 class="text-2xl font-semibold mb-6">⭐ 精选产品</h3>
            <div class="space-y-6">
              <div class="glass rounded-3xl p-6 flex justify-between items-center">
                <div>
                  <h4 class="font-semibold">黄金量化策略</h4>
                  <p class="text-gray-400">月化15%-30%</p>
                </div>
                <button onclick="toggleProduct(1)" class="px-8 py-3 rounded-3xl ${participated.has(1) ? 'bg-green-600' : 'bg-purple-600'}">
                  ${participated.has(1) ? '✅ 已参与' : '立即参与'}
                </button>
              </div>
            </div>
          </div>`;
      } else if (currentTab === 2) {
        content.innerHTML = `
          <div class="glass rounded-3xl p-8">
            <h3 class="text-2xl font-semibold mb-6">📣 推广中心</h3>
            <input id="user-name" placeholder="输入你的名字/署名" class="w-full glass rounded-2xl px-6 py-5 mb-6">
            <button onclick="generatePoster()" class="w-full py-5 bg-gradient-to-r from-pink-500 to-purple-600 rounded-3xl text-xl font-bold">生成我的专属海报</button>
            <div id="poster-preview" class="hidden mt-6">
              <canvas id="poster-canvas" width="600" height="380" class="mx-auto rounded-3xl shadow-2xl"></canvas>
              <button onclick="downloadPoster()" class="mt-6 w-full py-5 bg-white text-black rounded-3xl font-semibold">保存海报</button>
            </div>
          </div>`;
      }
    }

    function renderFiles() {
      const container = document.getElementById('file-list');
      if (!container) return;
      container.innerHTML = files.map(f => `
        <div onclick="window.open('${f.link}','_blank')" class="glass rounded-3xl p-6 hover:bg-white/10 cursor-pointer">
          <p class="font-medium">${f.name}</p>
        </div>
      `).join('');
    }

    function toggleProduct(id) {
      if (participated.has(id)) {
        participated.delete(id);
      } else {
        participated.add(id);
        alert("🎉 参与成功！已解锁高级权限");
      }
      renderCurrentTab();
    }

    function generatePoster() {
      const name = document.getElementById('user-name').value || "推广达人";
      const canvas = document.getElementById('poster-canvas');
      const ctx = canvas.getContext('2d');
      const preview = document.getElementById('poster-preview');

      ctx.fillStyle = '#1a0033';
      ctx.fillRect(0, 0, 600, 380);
      ctx.font = 'bold 52px Arial';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText('名人纪念馆', 300, 120);
      ctx.fillStyle = '#c4d0ff';
      ctx.fillText(name, 300, 220);

      preview.classList.remove('hidden');
    }

    function downloadPoster() {
      const canvas = document.getElementById('poster-canvas');
      const link = document.createElement('a');
      link.download = '我的推广海报.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    function showAdmin() {
      const name = prompt("资料名称");
      const link = prompt("IPFS链接");
      if (name && link) {
        files.push({name, link});
        alert("✅ 资料已添加！");
        renderFiles();
      }
    }

    window.onload = () => {
      renderCurrentTab();
    };
  </script>
</body>
</html>
