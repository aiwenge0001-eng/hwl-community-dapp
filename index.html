<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名人纪念馆 · 社群空间</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%); font-family: system-ui; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
    .neon { text-shadow: 0 0 15px rgba(168, 85, 247, 0.8); }
    .marquee { animation: marquee 30s linear infinite; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="max-w-6xl mx-auto p-5 md:p-6">

    <!-- 顶部导航 -->
    <nav class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-3">
        <img src="https://miniature-peach-donkey.myfilebase.com/ipfs/QmUjRwaTVSpK9wvXvKJc7jdu5jjvb3XtADk9ZCtUB3bmWH" 
             alt="Logo" class="w-10 h-10 md:w-12 md:h-12 rounded-2xl object-cover">
        <h1 class="text-2xl md:text-3xl font-bold neon">名人纪念馆</h1>
      </div>
      <button onclick="connectWallet()" 
              class="px-6 py-3 md:px-8 md:py-4 bg-gradient-to-r from-purple-600 to-blue-600 rounded-3xl font-semibold text-base md:text-lg hover:scale-105 transition-all text-center leading-tight">
        连接钱包<br>进入空间
      </button>
    </nav>

    <!-- 英雄区 -->
    <div class="text-center mb-10">
      <h2 class="text-4xl md:text-5xl font-bold mb-4 neon">欢迎来到你的专属加密家园</h2>
      <p class="text-lg md:text-xl text-gray-300">资料库 · 精选项目 · 推广工具 · 积分奖励</p>
      <div id="wallet-status" class="mt-6 text-base"></div>
    </div>

    <!-- 实时贡献动态 -->
    <div class="glass rounded-3xl p-5 mb-10">
      <h3 class="text-base font-medium mb-3 flex items-center gap-2"><i class="fas fa-fire text-orange-400"></i> 实时贡献动态</h3>
      <div class="overflow-hidden">
        <div class="marquee text-sm text-gray-300 whitespace-nowrap">
          @用户A 上传了《合约跟单教程》 · +800积分　　@userB 报名黄金量化 · 解锁VIP　　@userC 生成推广海报 · 获得达人徽章　　@userD 签到7天 · 领取NFT　　
        </div>
      </div>
    </div>

    <!-- 资料库（核心功能） -->
    <div class="glass rounded-3xl p-8 mb-8">
      <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3">
        <span class="text-4xl">📚</span> 社群资料库
      </h3>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="file-list">
        <!-- 这里会动态显示文件 -->
        <div class="bg-black/30 rounded-2xl p-5">
          <p class="text-gray-400 text-sm">暂无资料</p>
          <p class="text-xs text-gray-500 mt-1">管理员正在上传中...</p>
        </div>
      </div>

      <div class="mt-6 text-center text-purple-400 text-sm cursor-pointer hover:underline" onclick="alert('管理员上传功能开发中...')">
        + 添加新资料（仅管理员可见）
      </div>
    </div>

    <!-- 其他快速入口 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div onclick="alert('精选产品区开发中...')" class="glass rounded-3xl p-8 text-center hover:scale-105 transition cursor-pointer">
        <div class="text-5xl mb-4">⭐</div>
        <h3 class="text-xl font-semibold">精选产品</h3>
        <p class="text-gray-400">合约 · 量化 · 合作项目</p>
      </div>
      <div onclick="alert('推广中心开发中...')" class="glass rounded-3xl p-8 text-center hover:scale-105 transition cursor-pointer">
        <div class="text-5xl mb-4">📣</div>
        <h3 class="text-xl font-semibold">推广中心</h3>
        <p class="text-gray-400">个性化海报生成</p>
      </div>
    </div>

    <div class="text-center mt-12 text-gray-500 text-sm">
      DeBox 深度整合 · Web3 社群资料库 · MVP 版
    </div>
  </div>

  <script>
    async function connectWallet() {
      const status = document.getElementById('wallet-status');
      status.innerHTML = "🔄 正在连接...";
      try {
        if (window.deboxWallet) {
          await window.deboxWallet.connect();
          status.innerHTML = `✅ DeBox 已连接`;
        } else if (window.phantom?.solana) {
          await window.phantom.solana.connect();
          status.innerHTML = `✅ Phantom 已连接`;
        } else {
          alert("请在 DeBox 或 Phantom 中打开此页面");
        }
      } catch (e) {
        status.innerHTML = "❌ 连接失败";
      }
    }

    // 示例资料（后面会改成动态从 IPFS 读取）
    const sampleFiles = [
      { name: "新手合约跟单教程.pdf", type: "文档", link: "#" },
      { name: "黄金量化策略视频.mp4", type: "视频", link: "#" },
      { name: "常用工具合集.zip", type: "工具", link: "#" }
    ];

    function renderFiles() {
      const container = document.getElementById('file-list');
      container.innerHTML = sampleFiles.map(file => `
        <div class="glass rounded-2xl p-5 hover:bg-white/10 transition cursor-pointer" onclick="window.open('${file.link}', '_blank')">
          <div class="flex items-start gap-4">
            <div class="text-4xl flex-shrink-0">${file.type === '视频' ? '🎥' : file.type === '文档' ? '📄' : '🛠️'}</div>
            <div>
              <p class="font-medium">${file.name}</p>
              <p class="text-xs text-gray-400 mt-1">${file.type}</p>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 页面加载时渲染
    window.onload = renderFiles;
  </script>
</body>
</html>
