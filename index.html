<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名人纪念馆 · 社群空间</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%); font-family: system-ui; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
    .neon { text-shadow: 0 0 15px rgba(168, 85, 247, 0.8); }
    .marquee { animation: marquee 35s linear infinite; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="max-w-6xl mx-auto p-5 md:p-6">

    <!-- 顶部导航 -->
    <nav class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-3">
        <img src="https://miniature-peach-donkey.myfilebase.com/ipfs/QmUjRwaTVSpK9wvXvKJc7jdu5jjvb3XtADk9ZCtUB3bmWH" alt="Logo" class="w-12 h-12 rounded-2xl object-cover">
        <h1 class="text-3xl font-bold neon">名人纪念馆</h1>
      </div>
      <div class="flex gap-3">
        <button onclick="connectWallet()" class="px-8 py-4 bg-gradient-to-r from-purple-600 to-blue-600 rounded-3xl font-semibold">连接钱包</button>
        <button onclick="showAdmin()" class="px-6 py-4 glass rounded-3xl">👑 管理员</button>
      </div>
    </nav>

    <!-- 个人中心 & 积分 -->
    <div id="user-info" class="glass rounded-3xl p-6 mb-8 hidden">
      <div class="flex justify-between items-center">
        <div>
          <p class="text-sm text-gray-400">我的积分</p>
          <p id="points-display" class="text-4xl font-bold">1280</p>
        </div>
        <button onclick="dailyCheckIn()" class="px-8 py-3 bg-orange-500 hover:bg-orange-600 rounded-3xl font-medium">每日签到</button>
      </div>
    </div>

    <!-- 英雄区 -->
    <div class="text-center mb-10">
      <h2 class="text-4xl md:text-5xl font-bold mb-4 neon">欢迎来到你的专属加密家园</h2>
      <p class="text-lg md:text-xl text-gray-300">资料库 · 精选项目 · 推广工具</p>
      <div id="wallet-status" class="mt-6 text-base"></div>
    </div>

    <!-- 实时贡献动态 -->
    <div class="glass rounded-3xl p-5 mb-10">
      <h3 class="text-base font-medium mb-3 flex items-center gap-2"><i class="fas fa-fire text-orange-400"></i> 实时贡献动态</h3>
      <div class="overflow-hidden">
        <div class="marquee text-sm text-gray-300 whitespace-nowrap">
          @用户A 上传了《合约跟单教程》 · +800积分　　@userB 报名黄金量化 · 解锁VIP　　@userC 生成推广海报 · 获得达人徽章　　
        </div>
      </div>
    </div>

    <!-- 社群资料库 -->
    <div class="glass rounded-3xl p-8 mb-8">
      <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3"><span class="text-4xl">📚</span> 社群资料库</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="file-list"></div>
    </div>

    <!-- 精选产品 + 权限锁 -->
    <div class="glass rounded-3xl p-8 mb-8">
      <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3"><span class="text-4xl">⭐</span> 精选产品</h3>
      <div class="space-y-6" id="product-list"></div>
    </div>

    <!-- 推广海报 -->
    <div class="glass rounded-3xl p-8">
      <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3"><span class="text-4xl">📣</span> 推广中心</h3>
      <input id="user-name" type="text" placeholder="输入你的名字/署名" class="w-full glass rounded-2xl px-6 py-5 text-lg mb-6">
      <button onclick="generateCustomPoster()" class="w-full py-5 bg-gradient-to-r from-pink-500 to-purple-600 rounded-3xl text-xl font-bold">生成我的专属海报</button>
      <div id="poster-preview" class="hidden mt-6 text-center">
        <canvas id="poster-canvas" width="600" height="380" class="mx-auto rounded-3xl shadow-2xl"></canvas>
        <button onclick="downloadPoster()" class="mt-6 w-full py-5 bg-white text-black rounded-3xl font-semibold">💾 保存海报</button>
      </div>
    </div>

  </div>

  <!-- 管理员后台 -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass max-w-lg w-full mx-4 rounded-3xl p-8 max-h-[90vh] overflow-auto">
      <h3 class="text-2xl font-bold mb-6">👑 管理员后台</h3>
      
      <div class="space-y-8">
        <!-- 添加资料 -->
        <div>
          <h4 class="font-medium mb-3">添加资料</h4>
          <input id="new-file-name" placeholder="资料名称" class="w-full glass rounded-2xl px-5 py-4 mb-3">
          <input id="new-file-link" placeholder="IPFS链接" class="w-full glass rounded-2xl px-5 py-4">
          <button onclick="addFile()" class="mt-4 w-full py-4 bg-green-600 rounded-3xl">添加资料</button>
        </div>

        <!-- 添加海报模板 -->
        <div>
          <h4 class="font-medium mb-3">添加推广海报模板</h4>
          <input id="new-template-link" placeholder="模板图片 IPFS 链接" class="w-full glass rounded-2xl px-5 py-4">
          <button onclick="addTemplate()" class="mt-4 w-full py-4 bg-purple-600 rounded-3xl">添加模板</button>
        </div>
      </div>

      <button onclick="hideAdmin()" class="mt-8 w-full py-4 text-gray-400 border border-gray-500 rounded-3xl">关闭后台</button>
    </div>
  </div>

  <script>
    let connectedAddress = null;
    let points = 1280;
    let files = [];
    let templates = ["https://miniature-peach-donkey.myfilebase.com/ipfs/QmUjRwaTVSpK9wvXvKJc7jdu5jjvb3XtADk9ZCtUB3bmWH"];

    async function connectWallet() {
      const status = document.getElementById('wallet-status');
      status.innerHTML = "🔄 正在请求钱包授权...";
      try {
        if (window.deboxWallet) {
          await window.deboxWallet.connect();
          connectedAddress = window.deboxWallet.address;
        } else if (window.phantom?.solana) {
          await window.phantom.solana.connect();
          connectedAddress = window.phantom.solana.publicKey.toString();
        }
        status.innerHTML = `✅ 已连接<br><span class="text-xs">${connectedAddress.slice(0,12)}...</span>`;
        document.getElementById('user-info').classList.remove('hidden');
      } catch (e) {
        status.innerHTML = "❌ 用户取消授权";
      }
    }

    function dailyCheckIn() {
      if (!connectedAddress) return alert("请先连接钱包");
      points += 100;
      document.getElementById('points-display').textContent = points;
      alert("🎉 签到成功！+100 积分");
    }

    function addFile() {
      const name = document.getElementById('new-file-name').value;
      const link = document.getElementById('new-file-link').value;
      if (name && link) {
        files.push({name, link});
        renderFiles();
        hideAdmin();
        alert("✅ 资料已添加到资料库！");
      }
    }

    function addTemplate() {
      const link = document.getElementById('new-template-link').value;
      if (link) {
        templates.push(link);
        alert("✅ 新海报模板已添加！");
        hideAdmin();
      }
    }

    function renderFiles() {
      const container = document.getElementById('file-list');
      container.innerHTML = files.map(f => `
        <div onclick="window.open('${f.link}','_blank')" class="glass rounded-3xl p-6 hover:bg-white/10 cursor-pointer">
          <p class="font-medium">${f.name}</p>
        </div>
      `).join('');
    }

    function showAdmin() {
      document.getElementById('admin-modal').classList.remove('hidden');
    }

    function hideAdmin() {
      document.getElementById('admin-modal').classList.add('hidden');
    }

    function generateCustomPoster() {
      const name = document.getElementById('user-name').value.trim() || "推广达人";
      const canvas = document.getElementById('poster-canvas');
      const ctx = canvas.getContext('2d');
      const preview = document.getElementById('poster-preview');

      ctx.clearRect(0, 0, 600, 380);
      ctx.fillStyle = '#1a0033';
      ctx.fillRect(0, 0, 600, 380);

      const grad = ctx.createLinearGradient(0, 0, 600, 380);
      grad.addColorStop(0, '#6b21a8');
      grad.addColorStop(1, '#1e40af');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 600, 380);

      ctx.font = 'bold 52px Arial';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.fillText('名人纪念馆', 300, 120);

      ctx.font = 'bold 38px Arial';
      ctx.fillStyle = '#c4d0ff';
      ctx.fillText(name, 300, 220);

      preview.classList.remove('hidden');
    }

    function downloadPoster() {
      const canvas = document.getElementById('poster-canvas');
      const link = document.createElement('a');
      link.download = `推广海报-${document.getElementById('user-name').value || '推广达人'}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    window.onload = () => {
      renderFiles();
    };
  </script>
</body>
</html>
